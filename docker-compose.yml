services:
  postgres:
    image: postgres:16
    container_name: wheelbase-db-ui-fix
    environment:
      POSTGRES_DB: wheelbase
      POSTGRES_USER: wheel
      POSTGRES_PASSWORD: wheel
    ports:
      - "5432:5432"
    volumes:
      - wheelbase-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wheel -d wheelbase"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: wheelbase-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wheelbase.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  wheelbase-pgdata:
